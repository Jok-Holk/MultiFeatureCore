resource-pack:
  url: ""       # URL public đến file .zip (để trống = tắt)
  sha1: ""      # SHA-1 hex của file zip (để trống = bỏ qua kiểm tra)
  required: false  # true = bắt buộc player phải nhận

travel:
  title: "Fast Travel"
  size: 9
  default-icon: GRASS_BLOCK

checkpoint:
  countdown: 3          # Seconds before teleport
  cancel-on-move: true
  cooldown: 30          # Seconds between teleports
  sound:
    enable: true
    name: ENTITY_ENDERMAN_TELEPORT

rank:
  default: "GUEST"

  permissions:
    GUEST:
      - "multifeature.travel"
      - "multifeature.checkpoint.save"
      - "multifeature.checkpoint.load"
      - "multifeature.checkpoint.rename"

    BUILDER:
      - "multifeature.travel"
      - "multifeature.checkpoint.save"
      - "multifeature.checkpoint.load"
      - "multifeature.checkpoint.rename"
      - "multifeature.heightlock"
      - "multifeature.measure"
      - "multifeature.glass"
      - "minecraft.command.gamemode"
      - "minecraft.command.time"
      - "minecraft.command.effect"
      - "minecraft.command.clear"
      - "multifeature.speedfly"
      - "multifeature.kits"
      - "multifeature.horse"
      - "worldedit.*"
      - "voxelsniper.*"

    ADMIN:
      - "*"

    OWNER:
      - "*"

    DEVELOPER:
      - "*"

  colors:
    GUEST: "§7"
    BUILDER: "§a"
    ADMIN: "§e"
    OWNER: "§c"
    DEVELOPER: "§5"

messages:
  prefix: "§6[FastTravel] §f"
  saved: "Checkpoint §e%name% §fsaved!"
  renamed: "Checkpoint renamed to §e%name%"
  not-found: "Checkpoint not found!"
  countdown: "Teleporting in §e%time%§f..."
  moved: "You moved! Teleport cancelled."
  teleported: "Teleported to §a%name%"
  cooldown: "Please wait §e%time%§f seconds before next teleport."
